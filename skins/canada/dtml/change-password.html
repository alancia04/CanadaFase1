    <a href="/dashboard.php"><[bc_area]></a>
    <span class="sep">&raquo;</span>
    <a href="/profile.php"><[bc_profile]></a>
    <span class="sep">&raquo;</span>

<article class="panel" style="max-width:520px">
    <h2><[h_title]></h2>

    <[errors]>

    <form method="post" action="/change-password.php" class="auth-form" autocomplete="off">
        <div class="form-row">
            <label for="current_password"><[l_current]> *</label>
            <input type="password" id="current_password" name="current_password" required autocomplete="current-password">
        </div>
        <div class="form-row">
            <label for="new_password"><[l_new]> * (min 8)</label>
            <input type="password" id="new_password" name="new_password" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-row">
            <label for="new_password_conf"><[l_confirm]> *</label>
            <input type="password" id="new_password_conf" name="new_password_conf" required minlength="8" autocomplete="new-password">
        </div>
        <div class="form-row">
            <button class="btn" type="submit"><[btn_submit]></button>
            <a class="btn btn-outline" href="/profile.php"><[btn_cancel]></a>
        </div>
    </form>
</article>
