            <label for="issued_at"><[l_issued]> *</label>
            <input type="date" id="issued_at" name="issued_at" required>
        </div>
        <div class="form-row">
            <label for="expires_at"><[l_expires]> *</label>
            <input type="date" id="expires_at" name="expires_at" required>
        </div>
        <div class="form-row">
            <label for="file"><[l_file]> *</label>
            <input type="file" id="file" name="file" accept="application/pdf" required>
        </div>
        <div class="form-row"><button class="btn" type="submit"><[btn_upload]></button></div>
    </form>
