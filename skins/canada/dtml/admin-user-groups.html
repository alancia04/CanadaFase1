<[subnav]>

<section>
    <h1>Assegnazione Utenti / Gruppi</h1>

    <[errors]>

    <h2>Assegnazioni esistenti</h2>
    <table class="list">
        <thead>
            <tr><th>email</th><th>nome</th><th>gruppo</th><th></th></tr>
        </thead>
        <tbody>
            <[rows]>
        </tbody>
    </table>

    <h2>Nuova assegnazione</h2>
    <form method="post" action="/admin/user-groups.php?action=assign" class="auth-form">
        <div class="form-row">
            <label for="user_id">Utente *</label>
            <select id="user_id" name="user_id" required>
                <option value="">-- scegli --</option>
                <[user_opts]>
            </select>
        </div>
        <div class="form-row">
            <label for="group_id">Gruppo *</label>
            <select id="group_id" name="group_id" required>
                <option value="">-- scegli --</option>
                <[group_opts]>
            </select>
        </div>
        <div class="form-row">
            <button class="btn" type="submit">Assegna</button>
        </div>
    </form>
</section>
