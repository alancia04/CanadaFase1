<article class="panel">
    <h2>Annunci</h2>
    <[errors]>
    <table class="list">
        <thead><tr><th>titolo</th><th>autore</th><th>pubblicato il</th><th>stato</th><th></th></tr></thead>
        <tbody><[rows]></tbody>
    </table>
</article>

<article class="panel">
    <h2>Nuovo annuncio</h2>
    <form method="post" action="/admin/announcements.php?action=create" class="auth-form">
        <div class="form-row">
            <label for="title">Titolo *</label>
            <input type="text" id="title" name="title" value="<[title_v]>" maxlength="160" required>
        </div>
        <div class="form-row">
            <label for="body">Testo *</label>
            <textarea id="body" name="body" rows="6" required><[body_v]></textarea>
        </div>
        <div class="form-row">
            <label><input type="checkbox" name="is_published" value="1" checked> Pubblica subito</label>
        </div>
        <div class="form-row"><button class="btn" type="submit">Pubblica</button></div>
    </form>
</article>
